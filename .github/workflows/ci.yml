name: CI

# Everything here runs on a clean checkout with NO secrets. The escrow's
# build, test, fuzz and analysis paths never read ../.env — only deploying and
# running the agent need credentials, and neither happens in CI.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FOUNDRY_PROFILE: ci
  # How many echidna_* predicates the harness exposes. Both fuzzers assert they
  # registered exactly this many, so a property that silently stops being picked
  # up — a rename, a stale artifact, a bad build — fails the job instead of
  # reporting a smaller green run.
  # bump when adding an echidna_* predicate.
  EXPECTED_PROPERTIES: 6

jobs:
  # ---------------------------------------------------------------------------
  forge:
    name: forge (build, test, invariants, coverage gate)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1.3.1
        with:
          version: stable

      - name: Build
        run: forge build --sizes

      - name: Test (unit, fuzz and invariants)
        run: forge test -vvv

      - name: Coverage gate (100% on src/, one documented exclusion)
        # scripts/coverage.sh exits non-zero on any shortfall, and also on a
        # report it cannot parse — a format change must not pass by default.
        run: ./scripts/coverage.sh

      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: forge-coverage-summary
          path: coverage-summary.txt
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  go:
    name: go agent (vet, lint, test, 100% coverage gate)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-go@v5.1.0
        with:
          # Track agent/go.mod rather than pinning a number here, so the
          # toolchain can never drift below what the module requires.
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          # v2 of golangci-lint is required: the v1.x binaries are built with
          # Go 1.24 and refuse to lint a module targeting a newer Go than they
          # were built with. agent/.golangci.yml is in the v2 schema to match.
          version: v2.12.2
          working-directory: agent

      - name: Test with coverage
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic

      - name: Coverage gate (100.0% statements)
        run: |
          set -euo pipefail
          go tool cover -func=coverage.out | tail -20
          total="$(go tool cover -func=coverage.out | awk '/^total:/ {print $NF}')"
          echo "total coverage: $total"
          if [ "$total" != "100.0%" ]; then
            echo "::error::Go coverage is $total, required 100.0%"
            echo "Uncovered statements:"
            go tool cover -func=coverage.out | awk '$NF != "100.0%" && !/^total:/'
            exit 1
          fi
          echo "Go coverage gate passed: $total"

  # ---------------------------------------------------------------------------
  echidna:
    name: echidna (property fuzzing)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1.3.1
        with:
          version: stable

      - name: Install crytic-compile and slither
        run: |
          pipx install crytic-compile
          pipx install slither-analyzer

      # Echidna is installed as a plain binary rather than run via
      # crytic/echidna-action, because that action runs echidna inside a
      # container that has no `forge` on PATH — and crytic-compile shells out
      # to `forge config --json` to read the project layout. Installing it here
      # keeps echidna in the same environment as the toolchain it needs, and
      # makes the CI invocation identical to the documented local one.
      - name: Install echidna
        run: |
          set -euo pipefail
          curl -sSL -o echidna.tar.gz \
            https://github.com/crytic/echidna/releases/download/v2.2.6/echidna-2.2.6-x86_64-linux.tar.gz
          tar xzf echidna.tar.gz
          sudo install -m 0755 echidna /usr/local/bin/echidna
          echidna --version

      # Echidna consumes the artifacts forge produces (--foundry-ignore-compile
      # in echidna.yaml), so crytic-compile never needs to fetch its own solc.
      #
      # The rebuild is FORCED and crytic-export is deleted, unconditionally and
      # immediately before the fuzz step. `forge coverage` overwrites out/ with
      # coverage-instrumented artifacts, and crytic-compile will happily consume
      # those — or a stale crytic-export/ — and register a property set that
      # does not match the source. That silently shrank the suite to 4 of 5
      # properties once already. This job does not currently run coverage, but
      # the guard is here so a future reorder cannot bring the bug back.
      - name: Build artifacts for crytic-compile (forced, no stale exports)
        run: |
          set -euo pipefail
          rm -rf crytic-export
          forge build --force

      - name: Fuzz
        # Target the project directory, not the single file: crytic-compile
        # treats a lone .sol path as a standalone solc target and tries to
        # download a matching compiler.
        run: |
          set -euo pipefail
          echidna . --contract Properties --config echidna.yaml | tee echidna-output.txt
          found="$(grep -cE '^echidna_[a-z_]+: (passing|passed)' echidna-output.txt || true)"
          echo "echidna registered $found properties"
          if [ "$found" != "$EXPECTED_PROPERTIES" ]; then
            echo "::error::echidna registered $found properties, expected $EXPECTED_PROPERTIES"
            echo "A property stopped being picked up — check for a rename, a"
            echo "stale artifact, or a testPrefixes mismatch. If a predicate was"
            echo "added or removed on purpose, bump EXPECTED_PROPERTIES."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  medusa:
    name: medusa (property fuzzing)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1.3.1
        with:
          version: stable

      - uses: actions/setup-go@v5.1.0
        with:
          go-version-file: agent/go.mod
          cache: false

      - name: Install crytic-compile and slither
        # Medusa shells out to slither for its own analysis pass; without it
        # the run still works but loses that coverage guidance.
        run: |
          pipx install crytic-compile
          pipx install slither-analyzer

      - name: Install medusa
        run: |
          set -euo pipefail
          go install github.com/crytic/medusa@v1.5.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # Forced, and crytic-export deleted — same reasoning as the echidna job:
      # crytic-compile will consume coverage-instrumented or stale artifacts
      # without complaint and register a property set that does not match the
      # source, which reads as a smaller green run rather than a failure.
      - name: Build artifacts for crytic-compile (forced, no stale exports)
        run: |
          set -euo pipefail
          rm -rf crytic-export
          forge build --force

      - name: Fuzz
        # Medusa exits non-zero when a property fails, which fails the job.
        run: |
          set -euo pipefail
          medusa fuzz --config medusa.json 2>&1 | tee medusa-output.txt
          passed="$(sed -r 's/\x1b\[[0-9;]*m//g' medusa-output.txt \
            | grep -cE '\[PASSED\] Property Test:' || true)"
          echo "medusa passed $passed properties"
          if [ "$passed" != "$EXPECTED_PROPERTIES" ]; then
            echo "::error::medusa passed $passed properties, expected $EXPECTED_PROPERTIES"
            echo "A property stopped being picked up — check for a rename, a"
            echo "stale artifact, or a testPrefixes mismatch. If a predicate was"
            echo "added or removed on purpose, bump EXPECTED_PROPERTIES."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  slither:
    name: slither (static analysis)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1.3.1
        with:
          version: stable

      - name: Build artifacts for crytic-compile
        run: forge build

      - uses: crytic/slither-action@v0.4.0
        with:
          slither-config: slither.config.json
          # Reuse forge's artifacts; fail the job on any finding that survives
          # the documented exclusions in docs/slither-exclusions.md.
          slither-args: --ignore-compile
          fail-on: low
