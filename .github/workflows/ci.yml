name: CI

# Everything here runs on a clean checkout with NO secrets. The escrow's
# build, test, fuzz and analysis paths never read ../.env — only deploying and
# running the agent need credentials, and neither happens in CI.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FOUNDRY_PROFILE: ci

jobs:
  # ---------------------------------------------------------------------------
  forge:
    name: forge (build, test, invariants, coverage gate)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1.3.1
        with:
          version: stable

      - name: Build
        run: forge build --sizes

      - name: Test (unit, fuzz and invariants)
        run: forge test -vvv

      - name: Coverage gate (100% on src/, one documented exclusion)
        # scripts/coverage.sh exits non-zero on any shortfall, and also on a
        # report it cannot parse — a format change must not pass by default.
        run: ./scripts/coverage.sh

      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: forge-coverage-summary
          path: coverage-summary.txt
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  go:
    name: go agent (vet, lint, test, 100% coverage gate)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-go@v5.1.0
        with:
          # Track agent/go.mod rather than pinning a number here, so the
          # toolchain can never drift below what the module requires.
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6.1.1
        with:
          version: v1.64.8
          working-directory: agent

      - name: Test with coverage
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic

      - name: Coverage gate (100.0% statements)
        run: |
          set -euo pipefail
          go tool cover -func=coverage.out | tail -20
          total="$(go tool cover -func=coverage.out | awk '/^total:/ {print $NF}')"
          echo "total coverage: $total"
          if [ "$total" != "100.0%" ]; then
            echo "::error::Go coverage is $total, required 100.0%"
            echo "Uncovered statements:"
            go tool cover -func=coverage.out | awk '$NF != "100.0%" && !/^total:/'
            exit 1
          fi
          echo "Go coverage gate passed: $total"

  # ---------------------------------------------------------------------------
  echidna:
    name: echidna (property fuzzing)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1.3.1
        with:
          version: stable

      # Echidna consumes the artifacts forge produces (--foundry-ignore-compile
      # in echidna.yaml), so crytic-compile never needs to fetch its own solc.
      - name: Build artifacts for crytic-compile
        run: forge build

      - uses: crytic/echidna-action@v2.2.0
        with:
          files: .
          contract: Properties
          config: echidna.yaml
          test-mode: property
          # crytic-args stay in echidna.yaml (cryticArgs) so the local and CI
          # invocations cannot drift apart.

  # ---------------------------------------------------------------------------
  medusa:
    name: medusa (property fuzzing)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1.3.1
        with:
          version: stable

      - uses: actions/setup-go@v5.1.0
        with:
          go-version-file: agent/go.mod
          cache: false

      - name: Install crytic-compile and slither
        # Medusa shells out to slither for its own analysis pass; without it
        # the run still works but loses that coverage guidance.
        run: |
          pipx install crytic-compile
          pipx install slither-analyzer

      - name: Install medusa
        run: |
          set -euo pipefail
          go install github.com/crytic/medusa@v1.5.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build artifacts for crytic-compile
        run: forge build

      - name: Fuzz
        # Medusa exits non-zero when a property fails, which fails the job.
        run: medusa fuzz --config medusa.json

  # ---------------------------------------------------------------------------
  slither:
    name: slither (static analysis)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1.3.1
        with:
          version: stable

      - name: Build artifacts for crytic-compile
        run: forge build

      - uses: crytic/slither-action@v0.4.0
        with:
          slither-config: slither.config.json
          # Reuse forge's artifacts; fail the job on any finding that survives
          # the documented exclusions in docs/slither-exclusions.md.
          slither-args: --ignore-compile
          fail-on: low
