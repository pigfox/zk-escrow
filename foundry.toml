[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200

# crytic-compile (Echidna, Medusa, Slither) consumes these artifacts directly
# via --foundry-ignore-compile, so it never needs its own solc download.
build_info = true
extra_output = ["storageLayout"]

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "forge-std/=lib/forge-std/src/",
]

# Tests read the checked-in fixture proofs; nothing else touches the filesystem.
fs_permissions = [{access = "read", path = "./test/fixtures"}]

[lint]
# Verifier.sol is generated verbatim by snarkjs. Its naming and layout are not
# ours to change, and regenerating would just reintroduce any edits.
ignore = ["src/Verifier.sol"]

[profile.default.fuzz]
runs = 512

[profile.default.invariant]
runs = 256
# depth intentionally matches echidna.yaml's seqLen, so all three engines walk
# sequences of the same length and a bug found by one is reachable by the rest.
depth = 64
# Every harness entry point swallows its expected reverts by design, so a revert
# surfacing here is a harness bug — not a protocol finding — and must fail loud
# rather than silently shrinking the effective search space.
fail_on_revert = true

[profile.ci.fuzz]
runs = 1024

[profile.ci.invariant]
runs = 512
depth = 96

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = false
int_types = "long"
